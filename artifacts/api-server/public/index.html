<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoVault 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            vault: {
              bg: '#0A0B14',
              card: '#14152A',
              border: '#252640',
              primary: '#7B6EF6',
              muted: '#8B8FA8',
              success: '#00CBA8',
              danger: '#FF5E5B',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0A0B14; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #14152A; }
    ::-webkit-scrollbar-thumb { background: #252640; border-radius: 3px; }
    .nav-item { transition: all 0.15s ease; }
    .nav-item.active { background: rgba(123,110,246,0.15); color: #7B6EF6; border-left: 2px solid #7B6EF6; }
    .nav-item:not(.active):hover { background: rgba(255,255,255,0.04); }
    .stat-card { background: #14152A; border: 1px solid #252640; border-radius: 16px; padding: 20px; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .badge-success { background: rgba(0,203,168,0.15); color: #00CBA8; }
    .badge-warning { background: rgba(255,184,0,0.15); color: #FFB800; }
    .badge-danger { background: rgba(255,94,91,0.15); color: #FF5E5B; }
    .badge-purple { background: rgba(123,110,246,0.15); color: #7B6EF6; }
    .table-row:hover { background: rgba(255,255,255,0.02); }
    input { outline: none; }
    input:focus { border-color: #7B6EF6 !important; }
    #chart-container { position: relative; height: 220px; }
    @media (max-width: 700px) {
      #sidebar { transform: translateX(-100%); transition: transform 0.25s ease; }
      #sidebar.open { transform: translateX(0); }
      #main-content { margin-left: 0 !important; }
      #hamburger { display: flex !important; }
      #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9; }
      #sidebar-overlay.open { display: block; }
    }
    @media (min-width: 701px) {
      #hamburger { display: none !important; }
    }
  </style>
</head>
<body class="min-h-screen flex">

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside id="sidebar" style="width:220px;min-height:100vh;background:#10111E;border-right:1px solid #252640;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;z-index:10;display:flex;flex-direction:column;">
  <div style="padding:24px 20px 20px;border-bottom:1px solid #252640;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:36px;height:36px;background:#7B6EF6;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;">⬡</div>
      <div>
        <div style="font-size:15px;font-weight:700;color:#fff;">CryptoVault</div>
        <div style="font-size:11px;color:#8B8FA8;">管理后台</div>
      </div>
    </div>
  </div>
  <nav style="padding:12px 0;flex:1;">
    <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard"
         style="display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;margin-left:2px;border-left:2px solid #7B6EF6;">
      <span>📊</span><span style="font-size:14px;font-weight:500;">数据总览</span>
    </div>
    <div class="nav-item" onclick="navigate('wallets')" id="nav-wallets"
         style="display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;margin-left:2px;border-left:2px solid transparent;">
      <span>💼</span><span style="font-size:14px;font-weight:500;">钱包列表</span>
    </div>
    <div class="nav-item" onclick="navigate('transactions')" id="nav-transactions"
         style="display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;margin-left:2px;border-left:2px solid transparent;">
      <span>⚡</span><span style="font-size:14px;font-weight:500;">交易记录</span>
    </div>
    <div class="nav-item" onclick="navigate('db')" id="nav-db"
         style="display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;margin-left:2px;border-left:2px solid transparent;">
      <span>🗄</span><span style="font-size:14px;font-weight:500;">数据库</span>
    </div>
  </nav>
  <div style="padding:16px 20px;border-top:1px solid #252640;display:flex;flex-direction:column;gap:10px;">
    <button onclick="handleLogout()" style="width:100%;background:rgba(255,94,91,0.12);border:1px solid rgba(255,94,91,0.3);color:#FF5E5B;padding:8px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;">退出登录</button>
    <div style="font-size:11px;color:#8B8FA8;text-align:center;">v1.0.0 · 去中心化热钱包</div>
  </div>
</aside>

<!-- Main -->
<main id="main-content" style="margin-left:220px;flex:1;min-height:100vh;">
  <!-- Top bar -->
  <div style="position:sticky;top:0;z-index:5;background:#0A0B14;border-bottom:1px solid #252640;padding:16px 20px 16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <button id="hamburger" onclick="toggleSidebar()"
        style="display:none;background:transparent;border:none;color:#8B8FA8;cursor:pointer;padding:4px;flex-direction:column;gap:4px;align-items:center;">
        <span style="display:block;width:20px;height:2px;background:#8B8FA8;border-radius:2px;"></span>
        <span style="display:block;width:20px;height:2px;background:#8B8FA8;border-radius:2px;"></span>
        <span style="display:block;width:20px;height:2px;background:#8B8FA8;border-radius:2px;"></span>
      </button>
      <h1 id="page-title" style="font-size:18px;font-weight:700;color:#fff;margin:0;">数据总览</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="status-badge" class="badge badge-success">● 连接正常</div>
      <button onclick="refreshAll()" style="background:#252640;border:none;color:#8B8FA8;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;">↺ 刷新</button>
    </div>
  </div>

  <!-- Page content -->
  <div id="page-content" style="padding:24px 28px;">
    <div style="text-align:center;padding:60px 0;color:#8B8FA8;">正在加载...</div>
  </div>
</main>

<script>
let state = {
  page: 'dashboard',
  stats: null,
  wallets: [],
  transactions: [],
  walletSearch: '',
  txSearch: '',
  txFilter: 'all',
  chart: null,
  token: localStorage.getItem('adminToken') || null,
  dbTable: null,
  dbRows: [],
  dbTotal: 0,
  dbOffset: 0,
  dbLimit: 20,
  dbTables: [],
};

// ─── Fetch helpers ────────────────────────────────────────────────────────────

// ─── Mobile sidebar ───────────────────────────────────────────────────────────

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ─── Auth ─────────────────────────────────────────────────────────────────────

function showLogin() {
  document.getElementById('login-overlay').style.display = 'flex';
}
function hideLogin() {
  document.getElementById('login-overlay').style.display = 'none';
}

async function handleLogin(e) {
  e.preventDefault();
  const pwd = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '登录中...';
  try {
    const r = await fetch('/api/admin/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    if (!r.ok) throw new Error('wrong');
    const { token } = await r.json();
    state.token = token;
    localStorage.setItem('adminToken', token);
    hideLogin();
    await refreshAll();
  } catch {
    err.textContent = '密码错误，请重试';
  } finally {
    btn.disabled = false;
    btn.textContent = '登录';
  }
}

async function handleLogout() {
  try {
    await fetch('/api/admin/logout', {
      method: 'POST',
      headers: { Authorization: `Bearer ${state.token}` },
    });
  } catch {}
  state.token = null;
  localStorage.removeItem('adminToken');
  showLogin();
}

async function apiFetch(path, options = {}) {
  try {
    const headers = { ...(options.headers || {}) };
    if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
    const r = await fetch(`/api${path}`, { ...options, headers });
    if (r.status === 401) {
      state.token = null;
      localStorage.removeItem('adminToken');
      showLogin();
      return null;
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    console.error('API error', path, e);
    return null;
  }
}

async function loadStats() {
  const data = await apiFetch('/admin/stats');
  state.stats = data;
}

async function loadWallets() {
  const data = await apiFetch('/wallets?limit=200');
  state.wallets = data?.wallets ?? [];
}

async function loadTransactions() {
  const data = await apiFetch('/transactions?limit=200');
  state.transactions = data?.transactions ?? [];
}

async function refreshAll() {
  document.getElementById('status-badge').className = 'badge badge-warning';
  document.getElementById('status-badge').textContent = '● 刷新中';
  await Promise.all([loadStats(), loadWallets(), loadTransactions()]);
  document.getElementById('status-badge').className = 'badge badge-success';
  document.getElementById('status-badge').textContent = '● 连接正常';
  renderPage();
}

// ─── Navigation ───────────────────────────────────────────────────────────────

function navigate(page) {
  state.page = page;
  closeSidebar();
  ['dashboard','wallets','transactions','db'].forEach(p => {
    const el = document.getElementById(`nav-${p}`);
    if (el) {
      if (p === page) {
        el.classList.add('active');
        el.style.borderLeftColor = '#7B6EF6';
        el.style.color = '#7B6EF6';
      } else {
        el.classList.remove('active');
        el.style.borderLeftColor = 'transparent';
        el.style.color = '#8B8FA8';
      }
    }
  });
  const titles = { dashboard: '数据总览', wallets: '钱包列表', transactions: '交易记录', db: '数据库' };
  document.getElementById('page-title').textContent = titles[page] || page;
  renderPage();
}

function renderPage() {
  if (state.page === 'dashboard') renderDashboard();
  else if (state.page === 'wallets') renderWallets();
  else if (state.page === 'transactions') renderTransactions();
  else if (state.page === 'db') renderDatabase();
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function shortAddr(addr) {
  if (!addr) return '—';
  return addr.slice(0, 8) + '...' + addr.slice(-6);
}

function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function fmtEth(amount) {
  const n = parseFloat(amount);
  if (isNaN(n)) return '0';
  return n.toFixed(6) + ' ETH';
}

function statusBadge(status) {
  const map = { confirmed: ['badge-success','已确认'], pending: ['badge-warning','待确认'], failed: ['badge-danger','失败'] };
  const [cls, label] = map[status] ?? ['badge-purple', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

function networkLabel(netId) {
  return netId === 'mainnet' ? '<span class="badge badge-purple">主网</span>' : '<span class="badge badge-warning">测试网</span>';
}

// ─── Dashboard ────────────────────────────────────────────────────────────────

function renderDashboard() {
  const s = state.stats;
  const totalWallets = s?.totalWallets ?? 0;
  const totalTxs = s?.totalTransactions ?? 0;
  const totalVol = parseFloat(s?.totalVolume ?? 0).toFixed(4);
  const daily = s?.dailyTransactions ?? [];
  const recentWallets = s?.recentWallets ?? [];
  const recentTxs = s?.recentTxs ?? [];

  const statsCards = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;">
      <div class="stat-card">
        <div style="font-size:12px;color:#8B8FA8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">钱包总数</div>
        <div style="font-size:36px;font-weight:700;color:#7B6EF6;">${totalWallets}</div>
        <div style="font-size:12px;color:#8B8FA8;margin-top:6px;">注册钱包地址数量</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#8B8FA8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">交易总数</div>
        <div style="font-size:36px;font-weight:700;color:#00CBA8;">${totalTxs}</div>
        <div style="font-size:12px;color:#8B8FA8;margin-top:6px;">所有已同步的交易</div>
      </div>
      <div class="stat-card">
        <div style="font-size:12px;color:#8B8FA8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">ETH 总流通量</div>
        <div style="font-size:32px;font-weight:700;color:#FFB800;">${totalVol}</div>
        <div style="font-size:12px;color:#8B8FA8;margin-top:6px;">累计 ETH 转账金额</div>
      </div>
    </div>`;

  const chartLabels = daily.map(d => d.date?.slice(5) ?? '');
  const chartData = daily.map(d => parseInt(d.count));

  const recentWalletsHtml = recentWallets.length === 0
    ? '<div style="text-align:center;padding:20px;color:#8B8FA8;font-size:14px;">暂无数据</div>'
    : recentWallets.map(w => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #252640;">
        <div>
          <div style="font-size:13px;font-weight:600;color:#fff;font-family:monospace;">${shortAddr(w.address)}</div>
          <div style="font-size:11px;color:#8B8FA8;margin-top:2px;">${fmtDate(w.createdAt)}</div>
        </div>
        ${networkLabel(w.networkId)}
      </div>`).join('');

  const recentTxsHtml = recentTxs.length === 0
    ? '<div style="text-align:center;padding:20px;color:#8B8FA8;font-size:14px;">暂无数据</div>'
    : recentTxs.map(tx => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #252640;">
        <div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="color:${tx.type==='send'?'#FF5E5B':'#00CBA8'};font-size:16px;font-weight:700;">${tx.type==='send'?'↑':'↓'}</span>
            <span style="font-size:13px;font-weight:600;color:#fff;">${parseFloat(tx.amount).toFixed(4)} ETH</span>
          </div>
          <div style="font-size:11px;color:#8B8FA8;margin-top:2px;font-family:monospace;">${shortAddr(tx.hash)}</div>
        </div>
        ${statusBadge(tx.status)}
      </div>`).join('');

  document.getElementById('page-content').innerHTML = `
    ${statsCards}
    <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:16px;">
      <div class="stat-card">
        <div style="font-size:14px;font-weight:600;margin-bottom:16px;">交易量趋势 (近30天)</div>
        <div id="chart-container"><canvas id="txChart"></canvas></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="stat-card" style="flex:1;">
          <div style="font-size:14px;font-weight:600;margin-bottom:12px;">最新注册钱包</div>
          ${recentWalletsHtml}
        </div>
      </div>
    </div>
    <div class="stat-card" style="margin-top:16px;">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px;">最近交易</div>
      ${recentTxsHtml}
    </div>`;

  // Draw chart
  const ctx = document.getElementById('txChart');
  if (ctx) {
    if (state.chart) state.chart.destroy();
    state.chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartLabels.length ? chartLabels : ['暂无数据'],
        datasets: [{
          label: '交易数',
          data: chartData.length ? chartData : [0],
          borderColor: '#7B6EF6',
          backgroundColor: 'rgba(123,110,246,0.08)',
          tension: 0.4,
          fill: true,
          pointBackgroundColor: '#7B6EF6',
          pointRadius: 3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#252640' }, ticks: { color: '#8B8FA8', font: { size: 11 } } },
          y: { grid: { color: '#252640' }, ticks: { color: '#8B8FA8', stepSize: 1, font: { size: 11 } }, beginAtZero: true }
        }
      }
    });
  }
}

// ─── Wallets ──────────────────────────────────────────────────────────────────

function renderWallets() {
  const search = state.walletSearch.toLowerCase();
  const filtered = state.wallets.filter(w =>
    !search || w.address.includes(search) || (w.label??'').toLowerCase().includes(search)
  );

  const rows = filtered.length === 0
    ? `<tr><td colspan="6" style="text-align:center;padding:32px;color:#8B8FA8;">暂无数据</td></tr>`
    : filtered.map((w, i) => `
      <tr class="table-row" style="border-bottom:1px solid #252640;">
        <td style="padding:12px 16px;color:#8B8FA8;font-size:13px;">${i+1}</td>
        <td style="padding:12px 16px;font-family:monospace;font-size:13px;color:#fff;" title="${w.address}">${w.address}</td>
        <td style="padding:12px 16px;">
          <span id="lbl-${w.address.slice(2,8)}" style="font-size:13px;color:${w.label?'#fff':'#8B8FA8'};">${w.label || '—'}</span>
        </td>
        <td style="padding:12px 16px;">${networkLabel(w.networkId)}</td>
        <td style="padding:12px 16px;font-size:13px;color:#8B8FA8;">${fmtDate(w.createdAt)}</td>
        <td style="padding:12px 16px;display:flex;align-items:center;gap:12px;">
          <a href="https://etherscan.io/address/${w.address}" target="_blank"
             style="font-size:12px;color:#7B6EF6;text-decoration:none;">查看 ↗</a>
          <button onclick="openLabelModal('${w.address}','${(w.label||'').replace(/'/g,"\\\'")}')"
            style="background:rgba(123,110,246,0.15);border:none;color:#7B6EF6;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;">✏ 标签</button>
        </td>
      </tr>`).join('');

  document.getElementById('page-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="font-size:14px;color:#8B8FA8;">共 <b style="color:#fff;">${state.wallets.length}</b> 个钱包</div>
      <input type="text" placeholder="搜索地址或标签..." value="${state.walletSearch}"
             oninput="state.walletSearch=this.value;renderWallets()"
             style="background:#14152A;border:1px solid #252640;color:#fff;padding:8px 14px;border-radius:10px;width:280px;font-size:14px;" />
    </div>
    <div class="stat-card" style="padding:0;overflow:hidden;">
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;">
          <thead>
            <tr style="background:#1A1B2E;border-bottom:1px solid #252640;">
              <th style="padding:12px 16px;text-align:left;font-size:12px;color:#8B8FA8;font-weight:600;text-transform:uppercase;letter-spacing:1px;">#</th>
              <th style="padding:12px 16px;text-align:left;font-size:12px;color:#8B8FA8;font-weight:600;text-transform:uppercase;letter-spacing:1px;">钱包地址</th>
              <th style="padding:12px 16px;text-align:left;font-size:12px;color:#8B8FA8;font-weight:600;text-transform:uppercase;letter-spacing:1px;">标签</th>
              <th style="padding:12px 16px;text-align:left;font-size:12px;color:#8B8FA8;font-weight:600;text-transform:uppercase;letter-spacing:1px;">网络</th>
              <th style="padding:12px 16px;text-align:left;font-size:12px;color:#8B8FA8;font-weight:600;text-transform:uppercase;letter-spacing:1px;">注册时间</th>
              <th style="padding:12px 16px;text-align:left;font-size:12px;color:#8B8FA8;font-weight:600;text-transform:uppercase;letter-spacing:1px;">操作</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ─── Transactions ─────────────────────────────────────────────────────────────

function renderTransactions() {
  const search = state.txSearch.toLowerCase();
  const filter = state.txFilter;
  const filtered = state.transactions.filter(tx => {
    const matchSearch = !search || tx.hash.includes(search) || tx.fromAddress.includes(search) || tx.toAddress.includes(search);
    const matchFilter = filter === 'all' || tx.status === filter || tx.type === filter;
    return matchSearch && matchFilter;
  });

  const rows = filtered.length === 0
    ? `<tr><td colspan="7" style="text-align:center;padding:32px;color:#8B8FA8;">暂无数据</td></tr>`
    : filtered.map((tx, i) => `
      <tr class="table-row" style="border-bottom:1px solid #252640;">
        <td style="padding:12px 16px;color:#8B8FA8;font-size:13px;">${i+1}</td>
        <td style="padding:12px 16px;">
          <span style="color:${tx.type==='send'?'#FF5E5B':'#00CBA8'};font-size:14px;font-weight:700;">${tx.type==='send'?'↑ 发送':'↓ 接收'}</span>
        </td>
        <td style="padding:12px 16px;font-family:monospace;font-size:12px;color:#7B6EF6;" title="${tx.hash}">
          <a href="https://etherscan.io/tx/${tx.hash}" target="_blank" style="color:#7B6EF6;text-decoration:none;">${shortAddr(tx.hash)}</a>
        </td>
        <td style="padding:12px 16px;font-family:monospace;font-size:12px;color:#fff;" title="${tx.fromAddress}">${shortAddr(tx.fromAddress)}</td>
        <td style="padding:12px 16px;font-family:monospace;font-size:12px;color:#fff;" title="${tx.toAddress}">${shortAddr(tx.toAddress)}</td>
        <td style="padding:12px 16px;font-size:13px;font-weight:600;color:#FFB800;">${parseFloat(tx.amount).toFixed(6)} ETH</td>
        <td style="padding:12px 16px;">${statusBadge(tx.status)}</td>
        <td style="padding:12px 16px;font-size:12px;color:#8B8FA8;">${fmtDate(tx.createdAt)}</td>
      </tr>`).join('');

  const filterBtns = ['all','send','receive','confirmed','pending','failed'].map(f => {
    const labels = {all:'全部',send:'发送',receive:'接收',confirmed:'已确认',pending:'待确认',failed:'失败'};
    const active = filter === f;
    return `<button onclick="state.txFilter='${f}';renderTransactions()"
      style="padding:6px 14px;border-radius:8px;border:1px solid ${active?'#7B6EF6':'#252640'};
             background:${active?'rgba(123,110,246,0.2)':'transparent'};
             color:${active?'#7B6EF6':'#8B8FA8'};cursor:pointer;font-size:13px;font-weight:${active?'600':'400'};">${labels[f]}</button>`;
  }).join('');

  document.getElementById('page-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">${filterBtns}</div>
      <input type="text" placeholder="搜索哈希、地址..." value="${state.txSearch}"
             oninput="state.txSearch=this.value;renderTransactions()"
             style="background:#14152A;border:1px solid #252640;color:#fff;padding:8px 14px;border-radius:10px;width:260px;font-size:14px;" />
    </div>
    <div style="font-size:13px;color:#8B8FA8;margin-bottom:12px;">显示 <b style="color:#fff;">${filtered.length}</b> / ${state.transactions.length} 条交易</div>
    <div class="stat-card" style="padding:0;overflow:hidden;">
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;">
          <thead>
            <tr style="background:#1A1B2E;border-bottom:1px solid #252640;">
              ${['#','类型','交易哈希','发送方','接收方','金额','状态','时间'].map(h=>
                `<th style="padding:12px 16px;text-align:left;font-size:12px;color:#8B8FA8;font-weight:600;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;">${h}</th>`
              ).join('')}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ─── Database Viewer ──────────────────────────────────────────────────────────

async function loadDbTables() {
  const data = await apiFetch('/admin/db');
  state.dbTables = data?.tables ?? [];
}

async function loadDbTable(tableName, offset = 0) {
  state.dbTable = tableName;
  state.dbOffset = offset;
  const data = await apiFetch(`/admin/db?table=${tableName}&limit=${state.dbLimit}&offset=${offset}`);
  state.dbRows = data?.rows ?? [];
  state.dbTotal = data?.total ?? 0;
  renderDatabase();
}

function renderDatabase() {
  const el = document.getElementById('page-content');

  if (!state.dbTable) {
    const cards = state.dbTables.map(t => `
      <div class="stat-card" style="cursor:pointer;transition:border-color 0.15s;"
           onmouseenter="this.style.borderColor='#7B6EF6'" onmouseleave="this.style.borderColor='#252640'"
           onclick="loadDbTable('${t.name}')">
        <div style="font-size:28px;margin-bottom:12px;">🗄</div>
        <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;">${t.label}</div>
        <div style="font-size:28px;font-weight:700;color:#7B6EF6;margin-bottom:6px;">${t.count}</div>
        <div style="font-size:12px;color:#8B8FA8;">条记录 · 点击查看</div>
      </div>`).join('');

    el.innerHTML = `
      <div style="font-size:14px;color:#8B8FA8;margin-bottom:20px;">选择数据表查看原始数据</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;">${cards || '<div style="color:#8B8FA8;">正在加载...</div>'}</div>`;

    if (!state.dbTables.length) loadDbTables().then(renderDatabase);
    return;
  }

  const rows = state.dbRows;
  const cols = rows.length > 0 ? Object.keys(rows[0]) : [];
  const totalPages = Math.ceil(state.dbTotal / state.dbLimit);
  const currentPage = Math.floor(state.dbOffset / state.dbLimit) + 1;

  const thead = cols.map(c => `<th style="padding:10px 12px;text-align:left;font-size:11px;color:#8B8FA8;font-weight:600;text-transform:uppercase;white-space:nowrap;">${c}</th>`).join('');

  const tbody = rows.length === 0
    ? `<tr><td colspan="${cols.length}" style="text-align:center;padding:32px;color:#8B8FA8;">暂无数据</td></tr>`
    : rows.map(row => `<tr class="table-row" style="border-bottom:1px solid #252640;">
        ${cols.map(c => {
          const v = row[c];
          const display = v === null ? '<span style="color:#555;">NULL</span>'
            : typeof v === 'string' && v.length > 40 ? `<span title="${v}" style="font-family:monospace;font-size:12px;">${v.slice(0,40)}…</span>`
            : `<span style="font-family:monospace;font-size:12px;">${v}</span>`;
          return `<td style="padding:10px 12px;vertical-align:top;">${display}</td>`;
        }).join('')}
      </tr>`).join('');

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
      <button onclick="state.dbTable=null;renderDatabase()"
        style="background:#252640;border:none;color:#8B8FA8;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;">← 返回</button>
      <div style="font-size:14px;color:#fff;font-weight:600;">${state.dbTable}</div>
      <div style="font-size:13px;color:#8B8FA8;">共 <b style="color:#fff;">${state.dbTotal}</b> 条</div>
    </div>
    <div class="stat-card" style="padding:0;overflow:hidden;">
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr style="background:#1A1B2E;border-bottom:1px solid #252640;">${thead}</tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:10px;">
      <div style="font-size:13px;color:#8B8FA8;">第 ${currentPage} / ${totalPages || 1} 页</div>
      <div style="display:flex;gap:8px;">
        <button onclick="loadDbTable(state.dbTable, Math.max(0,state.dbOffset-state.dbLimit))"
          ${state.dbOffset === 0 ? 'disabled style="opacity:0.4;"' : ''}
          style="background:#252640;border:none;color:#8B8FA8;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;">← 上一页</button>
        <button onclick="loadDbTable(state.dbTable, state.dbOffset+state.dbLimit)"
          ${state.dbOffset + state.dbLimit >= state.dbTotal ? 'disabled style="opacity:0.4;"' : ''}
          style="background:#252640;border:none;color:#8B8FA8;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;">下一页 →</button>
      </div>
    </div>`;
}

// ─── Label Modal ──────────────────────────────────────────────────────────────

function openLabelModal(address, currentLabel) {
  document.getElementById('modal-address').textContent = address;
  document.getElementById('label-input').value = currentLabel || '';
  document.getElementById('label-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('label-input').focus(), 50);
  document.getElementById('label-modal').dataset.address = address;
}

function closeLabelModal() {
  document.getElementById('label-modal').style.display = 'none';
}

async function saveWalletLabel() {
  const address = document.getElementById('label-modal').dataset.address;
  const label = document.getElementById('label-input').value.trim();
  const btn = document.getElementById('save-label-btn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    const res = await fetch(`/api/wallets/${address}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label: label || null })
    });
    if (res.ok) {
      const idx = state.wallets.findIndex(w => w.address === address);
      if (idx !== -1) state.wallets[idx].label = label || null;
      closeLabelModal();
      if (state.page === 'wallets') renderWallets();
    }
  } finally {
    btn.disabled = false;
    btn.textContent = '保存';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLabelModal();
  if (e.key === 'Enter' && document.getElementById('label-modal').style.display === 'flex') saveWalletLabel();
});

// ─── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  if (!state.token) {
    showLogin();
    return;
  }
  await refreshAll();
}

init();
</script>
